<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Contador por Metragem</title>
<style>
  :root{--bg:#0E1116;--surface:#171B22;--surface2:#1E232C;--line:#2A2F3A;
    --text:#E8EAED;--muted:#8A929E;--accent:#F5B841;
    --mono:ui-monospace,"SF Mono","Roboto Mono",Menlo,monospace;--sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100%;
    display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent}
  header{padding:16px 18px 12px;border-bottom:1px solid var(--line)}
  header h1{font-size:16px;font-weight:700}
  header p{font-size:12px;color:var(--muted);margin-top:3px}
  main{flex:1;padding:18px;display:flex;flex-direction:column;gap:16px;max-width:520px;margin:0 auto;width:100%}

  .field label{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
  .inputwrap{display:flex;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .inputwrap:focus-within{border-color:var(--accent)}
  .inputwrap input{flex:1;background:none;border:none;outline:none;color:var(--text);
    font-family:var(--mono);font-size:30px;font-weight:600;padding:14px 16px;width:100%;min-width:0}
  .inputwrap .unit{padding:0 16px;color:var(--muted);font-size:14px;font-family:var(--mono);border-left:1px solid var(--line);align-self:stretch;display:flex;align-items:center}

  .unitpick{display:flex;gap:8px;margin-bottom:9px}
  .unitpick button{flex:1;background:var(--surface);border:1px solid var(--line);color:var(--muted);
    font-family:var(--sans);font-size:13px;font-weight:600;padding:9px;border-radius:10px;cursor:pointer}
  .unitpick button.on{background:var(--accent);color:#1a1400;border-color:var(--accent)}

  .result{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:26px 22px;text-align:center}
  .result .big{font-family:var(--mono);font-size:88px;font-weight:700;line-height:.9;color:var(--accent)}
  .result .lbl{font-size:14px;color:var(--muted);margin-top:8px}
  .result .detail{margin-top:14px;font-size:13px;color:var(--muted)}
  .result .detail b{color:var(--text);font-family:var(--mono)}

  .btnrow{display:flex;gap:10px}
  .btn{flex:1;border:1px solid var(--line);background:var(--surface2);color:var(--text);font-family:var(--sans);
    font-size:14px;font-weight:600;border-radius:12px;padding:14px;cursor:pointer}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--accent);color:#1a1400;border-color:var(--accent)}
</style>
</head>
<body>
  <header>
    <h1>Contador por Metragem</h1>
    <p>Altura da pilha ÷ espessura da chapa = quantidade.</p>
  </header>

  <main>
    <div class="field">
      <label>Altura da pilha</label>
      <div class="unitpick" id="unitPick">
        <button data-u="mm" class="on">milímetros</button>
        <button data-u="cm">centímetros</button>
      </div>
      <div class="inputwrap">
        <input id="altura" type="text" inputmode="decimal" placeholder="0" autocomplete="off">
        <span class="unit" id="alturaUnit">mm</span>
      </div>
    </div>

    <div class="field">
      <label>Espessura de 1 chapa</label>
      <div class="inputwrap">
        <input id="esp" type="text" inputmode="decimal" placeholder="0" autocomplete="off">
        <span class="unit">mm</span>
      </div>
    </div>

    <div class="result">
      <div class="big" id="qtd">—</div>
      <div class="lbl">chapas</div>
      <div class="detail" id="detail"></div>
    </div>

    <div class="btnrow">
      <button class="btn" id="clearBtn">Limpar</button>
      <button class="btn primary" id="copyBtn">Copiar</button>
    </div>
  </main>

<script>
(function(){
  function $(id){return document.getElementById(id);}
  var altura=$('altura'), esp=$('esp'), qtd=$('qtd'), detail=$('detail');
  var unit='mm';

  function num(v){ if(!v) return NaN; return parseFloat(String(v).replace(',','.')); }

  function calc(){
    var h=num(altura.value), e=num(esp.value);
    if(isNaN(h)||isNaN(e)||h<=0||e<=0){ qtd.textContent='—'; detail.textContent=''; return; }
    if(unit==='cm') h=h*10;
    var exato=h/e;
    var inteiro=Math.round(exato);
    qtd.textContent=inteiro;
    detail.innerHTML='Cálculo exato: <b>'+exato.toFixed(2)+'</b> chapas';
  }

  $('unitPick').addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b)return;
    unit=b.getAttribute('data-u');
    var kids=this.children; for(var i=0;i<kids.length;i++) kids[i].classList.toggle('on',kids[i]===b);
    $('alturaUnit').textContent=unit; calc();
  });

  altura.addEventListener('input',calc);
  esp.addEventListener('input',calc);

  $('clearBtn').addEventListener('click',function(){ altura.value=''; esp.value=''; qtd.textContent='—'; detail.textContent=''; altura.focus(); });
  $('copyBtn').addEventListener('click',function(){
    if(qtd.textContent==='—') return;
    var txt=qtd.textContent+' chapas';
    if(navigator.clipboard) navigator.clipboard.writeText(txt);
    var o=this.textContent; this.textContent='✓ Copiado'; var self=this; setTimeout(function(){self.textContent=o;},1000);
  });

  calc();
})();
</script>
</body>
</html>
